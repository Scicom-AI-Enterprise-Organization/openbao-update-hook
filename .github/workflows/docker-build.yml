name: build-image

# Native amd64 build, no QEMU, no Docker Hub pulls. Compile with setup-go,
# package FROM scratch (plain docker build = daemon BuildKit, no image pulls),
# then push to Huawei SWR with skopeo.
#
# SWR rejects OCI image manifests, so `skopeo copy --format v2s2` re-encodes the
# manifest as Docker v2 schema 2 on push (mirrors the agentic-repos SWR jobs).
# Auth is username/password (SWR robot account) via repo secrets.
#
# Tagging:
#   push to main      -> :edge, :sha-<commit>
#   push tag vX.Y.Z   -> :vX.Y.Z, :latest, :sha-<commit>  + a GitHub Release
#
# Cross-arch later? Don't use QEMU (slow). Use a matrix of NATIVE runners and
# stitch a manifest list — never emulation.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest # native amd64 (CCE nodes are x86)
    permissions:
      contents: write # create the GitHub Release on tags
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false # no external deps, nothing to cache

      - name: Build static binary (native amd64)
        working-directory: controller
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o audit-resync .

      - name: Build image (FROM scratch, into local daemon)
        working-directory: controller
        run: docker build -f Dockerfile.ci -t local-build:current .

      - name: Install skopeo
        run: sudo apt-get update -qq && sudo apt-get install -y skopeo

      - name: Push to SWR
        env:
          SWR_REGISTRY: ${{ secrets.SWR_REGISTRY }}
          SWR_REPOSITORY: ${{ secrets.SWR_REPOSITORY }}
          SWR_USERNAME: ${{ secrets.SWR_USERNAME }}
          SWR_PASSWORD: ${{ secrets.SWR_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            DESTS=("$GITHUB_REF_NAME" latest "sha-${GITHUB_SHA::12}")
          else
            DESTS=(edge "sha-${GITHUB_SHA::12}")
          fi
          for DEST in "${DESTS[@]}"; do
            skopeo copy --format v2s2 \
              --dest-creds "${SWR_USERNAME}:${SWR_PASSWORD}" \
              docker-daemon:local-build:current \
              "docker://${SWR_REGISTRY}/${SWR_REPOSITORY}:${DEST}"
            echo "pushed ${SWR_REGISTRY}/${SWR_REPOSITORY}:${DEST}"
          done

      - name: Cut GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
