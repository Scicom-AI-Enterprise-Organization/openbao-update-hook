name: build-image

# Native amd64 build, no QEMU, no Docker Hub pulls.
# Compile with setup-go (Go from go.dev), package FROM scratch, push to GHCR.
#
# Tagging:
#   push to main      -> :edge, :sha-<commit>
#   push tag vX.Y.Z   -> :vX.Y.Z, :latest, :sha-<commit>  + a GitHub Release
#
# Cross-arch later? Don't use QEMU (slow). Use a matrix of NATIVE runners, e.g.
#   strategy: { matrix: { include: [
#     { arch: amd64, runner: ubuntu-latest },
#     { arch: arm64, runner: ubuntu-24.04-arm } ] } }
# build per-arch tags on each native runner, then a final job that stitches them
# into a manifest list with `docker buildx imagetools create`.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest # native amd64
    permissions:
      contents: write # create the GitHub Release on tags
      packages: write # push to GHCR
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false # no external deps, nothing to cache

      - name: Build static binary (native amd64)
        working-directory: controller
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o audit-resync .

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build & push image (FROM scratch — no Docker Hub)
        working-directory: controller
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"   # GHCR requires lowercase
          TAGS=("$IMAGE:sha-${GITHUB_SHA::12}")
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            TAGS+=("$IMAGE:${GITHUB_REF_NAME}" "$IMAGE:latest")
          else
            TAGS+=("$IMAGE:edge")
          fi
          args=(); for t in "${TAGS[@]}"; do args+=(-t "$t"); done
          docker build -f Dockerfile.ci "${args[@]}" .
          for t in "${TAGS[@]}"; do docker push "$t"; done
          echo "pushed: ${TAGS[*]}"

      - name: Cut GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
